<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sounduct - Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="label">Configuración</span>
      <h1 class="filename">Rutas de Sounduct</h1>
    </div>

    <div class="settings-body">

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Carpeta de descargas</span>
          <span class="setting-desc">Donde caen tus descargas (Sounduct la escucha)</span>
        </div>
        <div class="setting-input">
          <span class="setting-path" id="path-descargas">...</span>
          <button class="btn-ruta" onclick="elegir('descargas')">Cambiar</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Biblioteca de música</span>
          <span class="setting-desc">Donde se guarda tu música organizada</span>
        </div>
        <div class="setting-input">
          <span class="setting-path" id="path-biblioteca">...</span>
          <button class="btn-ruta" onclick="elegir('biblioteca')">Cambiar</button>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <span class="setting-label">Pendrive</span>
          <span class="setting-desc">Ruta del pendrive (copia exacta de la biblioteca)</span>
        </div>
        <div class="setting-input">
          <span class="setting-path" id="path-pd">...</span>
          <button class="btn-ruta" onclick="elegir('pd')">Cambiar</button>
        </div>
      </div>

    </div>

    <div class="actions">
      <button class="btn btn-cancel" onclick="cancelar()">Cancelar</button>
      <button class="btn btn-confirm" onclick="guardar()">Guardar</button>
    </div>
  </div>

  <script>
    var rutas = { descargas: '', biblioteca: '', pd: '' }
    var _ids  = { descargas: 'path-descargas', biblioteca: 'path-biblioteca', pd: 'path-pd' }

    window.addEventListener('DOMContentLoaded', async () => {
      const cfg = await window.api.settings.getConfig()
      rutas.descargas  = cfg.descargas
      rutas.biblioteca = cfg.biblioteca
      rutas.pd         = cfg.pd
      document.getElementById('path-descargas').textContent  = cfg.descargas
      document.getElementById('path-biblioteca').textContent = cfg.biblioteca
      document.getElementById('path-pd').textContent         = cfg.pd
    })

    async function elegir(campo) {
      const titulos = {
        descargas:  'Seleccionar carpeta de descargas',
        biblioteca: 'Seleccionar biblioteca de música',
        pd:         'Seleccionar carpeta del pendrive'
      }
      const ruta = await window.api.settings.elegirCarpeta(titulos[campo])
      if (ruta) {
        rutas[campo] = ruta
        document.getElementById(_ids[campo]).textContent = ruta
      }
    }

    function guardar()  { window.api.settings.guardar(rutas) }
    function cancelar() { window.api.settings.cancelar() }
  </script>
</body>
</html>
