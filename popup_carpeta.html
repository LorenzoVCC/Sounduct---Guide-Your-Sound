<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housero</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="label">Nuevo track detectado</span>
      <h1 class="filename" id="filename">Artista - Nombre del Track.mp3</h1>
    </div>
    <div class="section">
      <span class="label">Carpeta destino</span>
      <ul class="folder-list" id="folder-list">
        <li class="folder-item selected">/ Raíz</li>
      </ul>
    </div>
    <div class="actions">
      <button class="btn btn-cancel" onclick="cancelar()">Cancelar</button>
      <button class="btn btn-confirm" onclick="confirmar()">Confirmar</button>
    </div>
  </div>
  <script>
    function conectar() {
      if (typeof qt === 'undefined' || !qt.webChannelTransport) {
        setTimeout(conectar, 100);
        return;
      }
      var s = document.createElement('script');
      s.src = 'qrc:///qtwebchannel/qwebchannel.js';
      s.onload = function() {
        new QWebChannel(qt.webChannelTransport, function(ch) {
          window._api = ch.objects.api;
          onApiReady(window._api);
        });
      };
      document.head.appendChild(s);
    }
    conectar();

    function onApiReady(api) {
      api.getNombre(function(nombre) {
        document.getElementById('filename').textContent = nombre;
      });
      api.getCarpetas(function(json) {
        var carpetas = JSON.parse(json);
        var lista = document.getElementById('folder-list');
        lista.innerHTML = '';
        carpetas.forEach(function(c, i) {
          var li = document.createElement('li');
          li.className = 'folder-item' + (i === 0 ? ' selected' : '');
          li.textContent = c;
          li.addEventListener('click', function() {
            document.querySelectorAll('.folder-item').forEach(function(el) { el.classList.remove('selected'); });
            li.classList.add('selected');
          });
          li.addEventListener('dblclick', function() { api.confirmar(li.textContent.trim()); });
          lista.appendChild(li);
        });
      });
      document.addEventListener('keydown', function(e) {
        var items = Array.from(document.querySelectorAll('.folder-item'));
        var idx = items.findIndex(function(i) { return i.classList.contains('selected'); });
        if (e.key === 'ArrowDown') { var n = Math.min(items.length-1, idx+1); items.forEach(function(i){i.classList.remove('selected');}); items[n].classList.add('selected'); items[n].scrollIntoView({block:'nearest'}); }
        if (e.key === 'ArrowUp') { var n = Math.max(0, idx-1); items.forEach(function(i){i.classList.remove('selected');}); items[n].classList.add('selected'); items[n].scrollIntoView({block:'nearest'}); }
        if (e.key === 'Enter') { var sel = document.querySelector('.folder-item.selected'); if (sel) api.confirmar(sel.textContent.trim()); }
        if (e.key === 'Escape') api.cancelar();
      });
    }

    function confirmar() {
      var sel = document.querySelector('.folder-item.selected');
      if (sel && window._api) window._api.confirmar(sel.textContent.trim());
    }
    function cancelar() {
      if (window._api) window._api.cancelar();
    }
  </script>
</body>
</html>
