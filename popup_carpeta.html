<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housero</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="label">Nuevo track detectado</span>
      <h1 class="filename" id="filename">Artista - Nombre del Track.mp3</h1>
    </div>
    <div class="section">
      <span class="label">Carpeta destino</span>
      <ul class="folder-list" id="folder-list">
        <li class="folder-item selected">/ Raíz</li>
      </ul>
    </div>
    <div class="actions">
      <button class="btn btn-cancel" onclick="cancelar()">Cancelar</button>
      <button class="btn btn-confirm" onclick="confirmar()">Confirmar</button>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const nombre   = await window.api.carpeta.getNombre()
      const carpetas = await window.api.carpeta.getCarpetas()

      document.getElementById('filename').textContent = nombre

      const lista = document.getElementById('folder-list')
      lista.innerHTML = ''
      carpetas.forEach((c, i) => {
        const li = document.createElement('li')
        li.className = 'folder-item' + (i === 0 ? ' selected' : '')
        li.textContent = c
        li.addEventListener('click', () => {
          document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('selected'))
          li.classList.add('selected')
        })
        li.addEventListener('dblclick', () => window.api.carpeta.confirmar(li.textContent.trim()))
        lista.appendChild(li)
      })

      document.addEventListener('keydown', e => {
        const items = Array.from(document.querySelectorAll('.folder-item'))
        const idx   = items.findIndex(i => i.classList.contains('selected'))
        if (e.key === 'ArrowDown') {
          const n = Math.min(items.length - 1, idx + 1)
          items.forEach(i => i.classList.remove('selected'))
          items[n].classList.add('selected')
          items[n].scrollIntoView({ block: 'nearest' })
        }
        if (e.key === 'ArrowUp') {
          const n = Math.max(0, idx - 1)
          items.forEach(i => i.classList.remove('selected'))
          items[n].classList.add('selected')
          items[n].scrollIntoView({ block: 'nearest' })
        }
        if (e.key === 'Enter') {
          const sel = document.querySelector('.folder-item.selected')
          if (sel) window.api.carpeta.confirmar(sel.textContent.trim())
        }
        if (e.key === 'Escape') window.api.carpeta.cancelar()
      })
    })

    function confirmar() {
      const sel = document.querySelector('.folder-item.selected')
      if (sel) window.api.carpeta.confirmar(sel.textContent.trim())
    }
    function cancelar() {
      window.api.carpeta.cancelar()
    }
  </script>
</body>
</html>
