<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housero - Sync</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="label">Pendrive conectado</span>
      <h1 class="sync-title" id="sync-title">Sincronizando...</h1>
    </div>
    <div class="summary" id="summary"></div>
    <div class="section" id="delete-section" style="display:none;">
      <span class="label">Archivos a borrar del PD</span>
      <ul class="delete-list" id="delete-list"></ul>
    </div>
    <div class="progress-section" id="progress-section" style="display:none;">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progress-label"></span>
    </div>
    <div class="actions" id="actions">
      <button class="btn btn-cancel" onclick="ahora_no()">Ahora no</button>
      <button class="btn btn-confirm" onclick="aplicar()">Aplicar al PD</button>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      window.api.sync.onProgreso(({ pct, nombre }) => actualizarProgreso(pct, nombre))

      const d       = await window.api.sync.getDatos()
      const summary = document.getElementById('summary')
      const title   = document.getElementById('sync-title')
      summary.innerHTML = ''

      if (d.copiar === 0 && d.borrar === 0) {
        title.textContent = 'Todo al dia'
        const div = document.createElement('div')
        div.className = 'summary-item'
        div.textContent = 'El PD ya esta actualizado'
        summary.appendChild(div)
        document.querySelector('.btn-confirm').disabled = true
        document.querySelector('.btn-confirm').style.opacity = '0.3'
      } else {
        const total = d.copiar + d.borrar
        title.textContent = total + ' cambio' + (total > 1 ? 's' : '') + ' pendiente' + (total > 1 ? 's' : '')
        if (d.copiar > 0) {
          const div = document.createElement('div')
          div.className = 'summary-item summary-copy'
          div.textContent = '+  ' + d.copiar + ' archivo' + (d.copiar > 1 ? 's' : '') + ' para copiar'
          summary.appendChild(div)
        }
        if (d.borrar > 0) {
          const div = document.createElement('div')
          div.className = 'summary-item summary-delete'
          div.textContent = 'x  ' + d.borrar + ' archivo' + (d.borrar > 1 ? 's' : '') + ' para borrar'
          summary.appendChild(div)
        }
      }

      if (d.lista_borrar && d.lista_borrar.length > 0) {
        const section = document.getElementById('delete-section')
        const lista   = document.getElementById('delete-list')
        section.style.display = 'flex'
        lista.innerHTML = ''
        d.lista_borrar.forEach(rel => {
          const li = document.createElement('li')
          li.className = 'delete-item'
          li.textContent = rel
          lista.appendChild(li)
        })
      }
    })

    function ahora_no() { window.api.sync.ahoraNno() }

    function aplicar() {
      document.getElementById('actions').style.display = 'none'
      document.getElementById('progress-section').style.display = 'block'
      window.api.sync.aplicar()
    }

    function actualizarProgreso(pct, nombre) {
      const fill  = document.getElementById('progress-fill')
      const label = document.getElementById('progress-label')
      if (fill)  fill.style.width  = pct + '%'
      if (label) label.textContent = nombre
    }
  </script>
</body>
</html>
